<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Giochi Didattici</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;font-size:20px;background:linear-gradient(135deg,#ff7a00,#ffd000,#e63900);color:white}header{text-align:center;padding:20px}header h1{margin:0;font-size:46px}.wrap{max-width:1500px;margin:auto;padding:20px}.panel{background:rgba(255,255,255,.2);border-radius:24px;padding:24px;margin-bottom:20px}input,button{padding:12px 16px;font-size:18px;border:none;border-radius:12px}button{background:#e63900;color:white;font-weight:bold;cursor:pointer}button:hover{background:#ff7a00}.hidden{display:none}#topbar{display:flex;gap:16px;flex-wrap:wrap;align-items:center;justify-content:space-between}.badge{background:white;color:#7a2400;border-radius:999px;padding:10px 16px;font-weight:bold}#gameArea{display:grid;grid-template-columns:1fr 330px;gap:20px}.stage{position:relative;width:100%;height:650px;background:#fff3c4;border:5px solid #e63900;border-radius:20px;overflow:hidden}.stage img.bg{width:100%;height:100%;object-fit:contain;display:block}.target{position:absolute;width:64px;height:64px;border-radius:50%;border:4px dashed #e63900;background:rgba(255,255,255,.7);transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;color:#7a2400;font-weight:bold}.target.ok{background:#2e9d44;color:white;border-style:solid}.items{background:rgba(255,255,255,.18);border-radius:20px;padding:16px;min-height:200px}.item{background:white;color:#e63900;border-radius:16px;padding:14px;margin-bottom:14px;text-align:center;cursor:grab}.item img{width:100px;height:100px;object-fit:contain;display:block;margin:8px auto}.item audio{width:100%}.feedback,.final{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:20;padding:20px}.modal{background:white;color:#7a2400;border-radius:24px;padding:28px;max-width:760px;text-align:center}.modal img{max-width:100%;max-height:330px;object-fit:contain}.modal button{margin-top:16px}.error{background:white;color:#8b0000;border-radius:16px;padding:16px;margin-top:16px}@media(max-width:1100px){#gameArea{grid-template-columns:1fr}.stage{height:70vw;min-height:420px}}
</style>
</head>
<body>
<header><h1>Player Giochi Didattici</h1><p>Carica un file JSON creato con l’editor</p></header>
<div class="wrap">
<section id="loader" class="panel"><h2>Carica gioco</h2><input id="jsonInput" type="file" accept=".json,application/json"><p>Il file viene letto localmente dal browser: non viene caricato online.</p><div id="loadError" class="error hidden"></div></section>
<section id="game" class="hidden">
<div class="panel" id="topbar"><div><h2 id="gameTitle"></h2><p id="instructions"></p></div><div class="badge">Punteggio: <span id="score">0</span></div><div id="timerBadge" class="badge hidden">Tempo: <span id="timeLeft">0</span>s</div><button onclick="resetGame()">Ricomincia</button></div>
<div id="gameArea"><div class="stage" id="stage"><img id="bg" class="bg" alt="Immagine del gioco"></div><div class="items"><h2>Elementi</h2><div id="items"></div></div></div>
</section>
</div>
<script>
let gameData=null,score=0,errorCount=0,placed={},timer=null,timeLeft=0;
document.getElementById('jsonInput').addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);validateGame(data);startGame(data);}catch(err){showLoadError('File JSON non valido: '+err.message);}};reader.readAsText(file);});
function validateGame(data){if(!data.titolo||!data.immagineCentrale||!Array.isArray(data.elementi))throw new Error('mancano titolo, immagine centrale o elementi.');if(data.elementi.length===0)throw new Error('non ci sono elementi nel gioco.');}
function startGame(data){gameData=data;document.getElementById('loader').classList.add('hidden');document.getElementById('game').classList.remove('hidden');document.getElementById('gameTitle').textContent=data.titolo;document.getElementById('instructions').textContent=data.istruzioni||'';document.getElementById('bg').src=data.immagineCentrale;resetGame();}
function resetGame(){score=0;errorCount=0;placed={};updateScore();clearInterval(timer);renderTargets();renderItems();if(gameData.timer&&gameData.timer.attivo){timeLeft=Number(gameData.timer.secondi)||60;document.getElementById('timerBadge').classList.remove('hidden');document.getElementById('timeLeft').textContent=timeLeft;timer=setInterval(()=>{timeLeft--;document.getElementById('timeLeft').textContent=timeLeft;if(timeLeft<=0){clearInterval(timer);showFinal(false);}},1000);}else{document.getElementById('timerBadge').classList.add('hidden');}}
function renderTargets(){document.querySelectorAll('.target').forEach(t=>t.remove());const stage=document.getElementById('stage');gameData.elementi.forEach((el,i)=>{const t=document.createElement('div');t.className='target';t.dataset.index=i;t.style.left=el.x+'%';t.style.top=el.y+'%';t.textContent=i+1;t.addEventListener('dragover',ev=>ev.preventDefault());t.addEventListener('drop',ev=>{ev.preventDefault();const dragged=Number(ev.dataTransfer.getData('text/plain'));checkDrop(dragged,i);});stage.appendChild(t);});}
function renderItems(){const box=document.getElementById('items');box.innerHTML='';gameData.elementi.forEach((el,i)=>{if(placed[i])return;const div=document.createElement('div');div.className='item';div.draggable=true;div.addEventListener('dragstart',ev=>ev.dataTransfer.setData('text/plain',i));let html='';if(el.nome&&(el.tipo!=='image'&&el.tipo!=='audio'))html+=`<strong>${escapeHTML(el.nome)}</strong>`;else html+=`<strong>Elemento ${i+1}</strong>`;if(el.immagine)html+=`<img src="${el.immagine}" alt="">`;if(el.audio)html+=`<audio controls src="${el.audio}"></audio>`;div.innerHTML=html;box.appendChild(div);});}
function checkDrop(dragged,target){if(dragged===target){placed[dragged]=true;score+=gameData.punteggio?.corretta??1;updateScore();document.querySelector(`.target[data-index="${target}"]`).classList.add('ok');renderItems();if(Object.keys(placed).length===gameData.elementi.length){clearInterval(timer);showFinal(true);}}else{errorCount++;if(errorCount>=Number(gameData.maxErrori||2)){showFeedback();errorCount=0;}else{alert('Non è la posizione corretta. Riprova.');}}}
function showFeedback(){const fb=gameData.feedback||{};const overlay=document.createElement('div');overlay.className='feedback';let media='';if((fb.tipo==='imageText'||fb.tipo==='all')&&fb.immagine)media+=`<img src="${fb.immagine}" alt="Feedback">`;if((fb.tipo==='audioText'||fb.tipo==='all')&&fb.audio)media+=`<audio controls autoplay src="${fb.audio}"></audio>`;overlay.innerHTML=`<div class="modal"><h2>Aiuto</h2><p>${escapeHTML(fb.testo||'Osserva e riprova.')}</p>${media}<br><button onclick="this.closest('.feedback').remove()">Continua</button></div>`;document.body.appendChild(overlay);}
function showFinal(success){const overlay=document.createElement('div');overlay.className='final';const msg=success?(gameData.messaggioFinale||'Complimenti, hai completato il gioco!'):'Tempo scaduto. Puoi riprovare.';const img=success&&gameData.immagineFinale?`<img src="${gameData.immagineFinale}" alt="Immagine finale">`:'';overlay.innerHTML=`<div class="modal"><h2>${success?'Gioco completato':'Fine gioco'}</h2><p>${escapeHTML(msg)}</p><p><strong>Punteggio finale: ${score}</strong></p>${img}<br><button onclick="this.closest('.final').remove();resetGame()">Ricomincia</button></div>`;document.body.appendChild(overlay);}
function updateScore(){document.getElementById('score').textContent=score;}
function showLoadError(msg){const box=document.getElementById('loadError');box.textContent=msg;box.classList.remove('hidden');}
function escapeHTML(str){return String(str).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
</script>
</body>
</html>
